<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">
    <link rel="stylesheet" href="form.css" />
    <title>Booking form</title>
</head>
<body>
  <div class="booking">Booking form</div>
    <div class="MAIN_FORM" style="padding-left: 430px; padding-top: 45px;">

    <div class="input-group mb-3" style="width: 500px;">
      <span class="input-group-text" id="basic-addon1">Pets' owner name</span>
      <input type="text" class="form-control" placeholder="Name">
    </div>
    
    <div class="input-group mb-3"style="width: 500px;">
      <span class="input-group-text" id="basic-addon1">Pets' name</span>
      <input type="text" class="form-control" placeholder="Name">
    </div>
    
    <div class="mb-3" style="width: 500px;">
      
      <div class="input-group">
        <span class="input-group-text" id="basic-addon1">Pet type?</span>
      <input type="text" class="form-control" placeholder="Cat, Dog etc">
      </div>
    </div>
    
    <div class="input-group mb-3" style="width: 500px;">
      <span class="input-group-text">Booking Type</span>
      <input type="text" class="form-control">
    </div>
    
    <p>Which doctor you want to see?</p>
    <div class="input-group mb-3" style="width: 500px;">
      <input type="radio" name="gender" value="Dr. Sirius Black"> Dr. Sirius Black<br>
      <input type="radio" name="gender" value="Dr. Severus Snape"> Dr. Severus Snape<br>
      <input type="radio" name="gender" value="Dr. Reamus Lupin"> Dr. Reamus Lupin
    </div>
    
    <div class="input-group"style="width: 500px;">
      <span class="input-group-text">With textarea</span>
      <textarea class="form-control" aria-label="With textarea"></textarea>
    </div>
    </div>
</body>
</html>
